services:

  pocketbase:
    build:
      context: ./database
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8090:8090"          # direct access: http://localhost:8090/_/
    volumes:
      - ./database/pb_data:/pb/pb_data          # local pb_data so dev DB persists
      - ./database/pb_migrations:/pb/pb_migrations  # live-reload migrations
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8090/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  sveltekit:
    image: node:22-alpine
    working_dir: /app
    restart: unless-stopped
    ports:
      - "5173:5173"          # Vite dev server: http://localhost:5173
    volumes:
      - ./project:/app       # mount source so hot-reload works
      - /app/node_modules    # anonymous volume keeps container node_modules isolated
    environment:
      - PUBLIC_POCKETBASE_URL=http://localhost:8090
      - POCKETBASE_URL=http://pocketbase:8090
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      pocketbase:
        condition: service_healthy
